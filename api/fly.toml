# fly.toml — deploy FastAPI to Fly.io
# Run: fly launch (first time) or fly deploy (updates)

app = "biodiversity-map-api"       # change to your chosen app name
primary_region = "fra"             # Frankfurt — close to LMU Munich

[build]
  dockerfile = "Dockerfile"

[env]
  ALLOWED_ORIGINS = "https://YOUR_GITHUB_USERNAME.github.io"

[[services]]
  protocol = "tcp"
  internal_port = 8000

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [[services.ports]]
    port = 80
    handlers = ["http"]

  [services.concurrency]
    type = "requests"
    hard_limit = 50
    soft_limit = 25

[mounts]
  # Mount a persistent volume for documents.sqlite (large file)
  # Create with: fly volumes create biodiversity_data --size 2
  source = "biodiversity_data"
  destination = "/data"
